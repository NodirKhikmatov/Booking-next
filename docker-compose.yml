services:
  booking:
    container_name: booking-next
    restart: always
    image: node:20.10.0
    ports:
      - '4000:3000'
    environment:
    - Port=3000

    volumes:
      - ./:/usr/src/booking-next
    working_dir: /usr/src/booking-next
    networks:
      - client-network
    command: bash -c "yarn  && yarn run build && yarn run start:prod"


networks:
  client-network:
    driver: bridge
